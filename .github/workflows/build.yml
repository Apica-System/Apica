name: Build Apica

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Zig
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://ziglang.org/download/0.15.2/zig-windows-x86_64-0.15.2.zip" -OutFile "zig.zip"
          Expand-Archive zig.zip -DestinationPath "C:\zig"
          $env:PATH = "C:\zig\zig-windows-x86_64-0.15.2;" + $env:PATH

      - name: Install Zig (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            curl -L https://ziglang.org/download/0.15.2/zig-macos-x86_64-0.15.2.tar.xz -o zig.tar.xz
            tar -xf zig.tar.xz -C $HOME
            echo "$HOME/zig-macos-x86_64-0.15.2" >> $GITHUB_PATH
          else
            curl -L https://ziglang.org/download/0.15.2/zig-linux-x86_64-0.15.2.tar.xz -o zig.tar.xz
            tar -xf zig.tar.xz -C $HOME
            echo "$HOME/zig-linux-x86_64-0.15.2" >> $GITHUB_PATH
          fi

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libglfw3-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libglew-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install glfw

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install glfw -y
          # MSVC Build Tools sont déjà présents sur windows-latest

      - name: Build
        run: zig build -p build

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: apica-${{ runner.os }}
          path: ./zig-out/bin/Apica.exe
