name: Build Apica

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Zig
        uses: ziglang/setup-zig@v1
        with:
          version: "0.15.2"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libglfw3-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libglew-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install glfw

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install glfw -y
          # MSVC Build Tools sont déjà présents sur windows-latest

      - name: Build
        run: zig build -p build

      - name: Upload executable
        uses: actions/upload-artifact@v3
        with:
          name: apica-${{ runner.os }}
          path: ./zig-out/bin/Apica.exe
